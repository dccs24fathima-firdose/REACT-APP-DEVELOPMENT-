<!DOCTYPE html>
<html>
<head>
<title>Expense Analytics Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

<h1>💰 Daily Expense Analytics Dashboard</h1>


<div class="summary">

<div class="box income">
<h3>Total Income</h3>
<h2 id="income">₹0</h2>
</div>


<div class="box expense">
<h3>Total Expense</h3>
<h2 id="expense">₹0</h2>
</div>


<div class="box balance">
<h3>Balance</h3>
<h2 id="balance">₹0</h2>
</div>

</div>



<div class="content">


<div class="card form">

<h2>Add Transaction</h2>


<input id="title" placeholder="Transaction Name">


<input id="amount" 
type="number" 
placeholder="Amount">


<select id="type">

<option value="income">
Income
</option>

<option value="expense">
Expense
</option>

</select>


<select id="category">

<option>Food</option>
<option>Travel</option>
<option>Shopping</option>
<option>Bills</option>
<option>Salary</option>
<option>Other</option>

</select>


<button onclick="addTransaction()">
Add Transaction
</button>


</div>




<div class="card">


<h2>Transactions</h2>


<table>

<thead>

<tr>

<th>Name</th>
<th>Amount</th>
<th>Category</th>

</tr>

</thead>


<tbody id="table">

</tbody>

</table>


</div>


</div>



<div class="card analytics">


<h2>Category Analytics</h2>


<div id="categoryBox"></div>


</div>


</div>


<script src="script.js"></script>

</body>
</html>
